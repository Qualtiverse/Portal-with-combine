name: Build Portal-Base Server DLL

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022

    steps:
    - uses: actions/checkout@v4

    - name: Setup Visual Studio 2022
      uses: microsoft/setup-msbuild@v2

    - name: Build server DLL
      shell: cmd
      run: |
        MSBuild.exe game\server\server_hl2.vcxproj /p:Configuration=Release /p:Platform=Win32 /p:PlatformToolset=v143 /fl /flp:logfile=build.log /clp:Verbosity=minimal
        if errorlevel 1 (
            echo "BUILD FAILED - collecting errors..."
            if exist build.log (
                findstr /n /r /i "error fatal LNK" build.log > build_errors.txt
                type build_errors.txt
            )
            exit /b 1
        )
        exit /b 0

    - name: Upload build errors
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-errors
        path: build_errors.txt

    - name: Upload server.dll (if built)
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: server-dll
        path: game\server\Release_hl2_with_ashpd\server.dll

    - name: Upload build log
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: build-log
        path: build.log
