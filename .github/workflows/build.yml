name: Build Portal-Base Server DLL

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022

    steps:
    - uses: actions/checkout@v4

    - name: Build server DLL
      shell: pwsh
      run: |
        $vspath = & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" -latest -products * -requires Microsoft.Component.MSBuild -property installationPath
        $msbuild = Join-Path $vspath "MSBuild\Current\Bin\MSBuild.exe"
        & $msbuild game\server\server_hl2.vcxproj /p:Configuration=Release /p:Platform=Win32 /m /v:detailed 2>&1 | Tee-Object -FilePath build.log
        if ($LASTEXITCODE -ne 0) {
          $errors = Get-Content build.log | Where-Object { $_ -match "error|fatal|Error|FATAL" } | Select-Object -First 20
          foreach ($e in $errors) { Write-Host "::error::$e" }
          throw "MSBuild failed (exit $LASTEXITCODE)"
        }

    - name: Show build log tail
      if: failure()
      shell: pwsh
      run: |
        $lines = Get-Content build.log
        Write-Host "=== Build log lines: $($lines.Count) ==="
        $lines | Select-Object -Last 60
