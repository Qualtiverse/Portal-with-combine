name: Build Portal-Base Server DLL

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022

    steps:
    - uses: actions/checkout@v4

    - name: Setup Visual Studio 2022
      uses: microsoft/setup-msbuild@v2

    - name: Build server DLL
      shell: cmd
      run: |
        MSBuild.exe game\server\server_hl2.vcxproj /p:Configuration=Release /p:Platform=Win32 /p:PlatformToolset=v143 /fl /flp:logfile=build.log /clp:Verbosity=minimal 2>&1
        set EXITCODE=%errorlevel%
        echo "BUILD_EXIT_CODE=%EXITCODE%" >> %GITHUB_ENV%
        echo "EXIT CODE: %EXITCODE%"
        if %EXITCODE% neq 0 (
          if exist build.log (
            echo === BUILD LOG ERRORS ===
            findstr /n /r /i "error" build.log
            echo === END BUILD LOG ERRORS ===
          )
        )
        exit /b %EXITCODE%

    - name: Upload server.dll (if built)
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: server-dll
        path: game\server\Release_hl2_with_ashpd\server.dll

    - name: Upload build log
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: build-log
        path: build.log
