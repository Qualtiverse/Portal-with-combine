name: Build Portal-Base Server DLL

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022

    steps:
    - uses: actions/checkout@v4

    - name: Build server DLL
      shell: pwsh
      run: |
        $vspath = & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" -latest -products * -property installationPath
        $vcvars = Join-Path $vspath "VC\Auxiliary\Build\vcvars32.bat"
        $msbuild = Join-Path $vspath "MSBuild\Current\Bin\MSBuild.exe"
        cmd /c "`"$vcvars`" && `"$msbuild`" game\server\server_hl2.vcxproj /p:Configuration=Release /p:Platform=Win32 /m /v:detailed 2>&1" | Tee-Object -FilePath build.log
        if ($LASTEXITCODE -ne 0) {
          $errors = Get-Content build.log | Where-Object { $_ -match "error " } | Select-Object -First 10
          foreach ($e in $errors) {
            Write-Host "::error::$e"
          }
          Get-Content build.log -Tail 30
          throw "MSBuild failed (exit $LASTEXITCODE)"
        }

    - name: Upload build log
      uses: actions/upload-artifact@v4
      with:
        name: build-log
        path: build.log

    - name: Upload server.dll
      uses: actions/upload-artifact@v4
      with:
        name: server-dll
        path: game/server/Release_hl2_with_ashpd/server.dll
