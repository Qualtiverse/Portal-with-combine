name: Build Portal-Base Server DLL

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022

    steps:
    - uses: actions/checkout@v4

    - name: Add MSBuild to PATH
      shell: pwsh
      run: |
        $vspath = & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" -latest -products * -requires Microsoft.Component.MSBuild -property installationPath
        if (-not $vspath) { throw "VS not found" }
        $msbuild = Join-Path $vspath "MSBuild\Current\Bin\MSBuild.exe"
        if (Test-Path $msbuild) {
          echo "MSBUILD_EXE=$msbuild" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
        } else {
          throw "MSBuild not found at $msbuild"
        }
        echo "Using: $msbuild"

    - name: Build server DLL
      shell: pwsh
      continue-on-error: true
      run: |
        & "$env:MSBUILD_EXE" game\server\server_hl2.vcxproj /p:Configuration=Release /p:Platform=Win32 /p:PlatformToolset=v143 /m /v:detailed /fl /flp:logfile=build.log;verbosity=detailed

    - name: Upload build log
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-log
        path: build.log

    - name: Upload server.dll (if built)
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: server-dll
        path: game\server\Release_hl2_with_ashpd\server.dll
