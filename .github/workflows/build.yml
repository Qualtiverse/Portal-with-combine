name: Build Portal-Base Server DLL

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022

    steps:
    - uses: actions/checkout@v4

    - name: Setup Visual Studio 2022
      uses: microsoft/setup-msbuild@v2

    - name: Build server DLL
      shell: cmd
      run: |
        set VSCMD_SKIP_SENDTELEMETRY=1
        MSBuild.exe game\server\server_hl2.vcxproj /p:Configuration=Release /p:Platform=Win32 /p:PlatformToolset=v143 /fl /flp:logfile=build.log /clp:Verbosity=minimal
        echo "BUILD EXIT CODE: %errorlevel%"

    - name: Upload server.dll (if built)
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: server-dll
        path: game\server\Release_hl2_with_ashpd\server.dll

    - name: Upload build log
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: build-log
        path: build.log

    - name: Print build log tail
      if: failure()
      shell: cmd
      run: |
        if exist build.log findstr /n /r "error" build.log
